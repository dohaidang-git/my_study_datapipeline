x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: docker/airflow/Dockerfile
  user: "0:0"
  env_file:
    - .env.example
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__FERNET_KEY: "${AIRFLOW_FERNET_KEY:-}"
    AIRFLOW__CORE__DEFAULT_TIMEZONE: Asia/Ho_Chi_Minh
    AIRFLOW__CORE__AUTH_MANAGER: airflow.api_fastapi.auth.managers.simple.simple_auth_manager.SimpleAuthManager
    AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_USERS: "${AIRFLOW_ADMIN_USERNAME:-admin}:admin"
    AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_PASSWORDS_FILE: /opt/airflow/configs/airflow/simple_auth_manager_passwords.json
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://airflow-webserver:8080/execution/
    AIRFLOW__API_AUTH__JWT_SECRET: "${AIRFLOW_API_JWT_SECRET:-bigdata-hudi-airflow-jwt-secret}"
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow
    AIRFLOW_UID: "50000"
  volumes:
    - ./dags:/opt/airflow/dags
    - ./pipelines:/opt/airflow/pipelines
    - ./configs:/opt/airflow/configs
    - ./scripts:/opt/airflow/scripts
    - ./jars:/opt/airflow/jars:ro
    - ./logs/airflow:/opt/airflow/logs
    - /var/run/docker.sock:/var/run/docker.sock
  group_add:
    - "${DOCKER_SOCK_GID:-65534}"
  networks:
    - lakehouse
  depends_on:
    airflow-postgres:
      condition: service_healthy

services:
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:-minioadmin}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:-minioadmin}"
    ports:
      - "9010:9000"
      - "9011:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lakehouse

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin} &&
      mc mb --ignore-existing local/lakehouse &&
      mc anonymous set none local/lakehouse
      "
    volumes:
      - ./data:/lake:ro
    networks:
      - lakehouse

  metastore-postgres:
    image: postgres:16
    container_name: metastore-postgres
    environment:
      POSTGRES_DB: metastore_db
      POSTGRES_USER: hive
      POSTGRES_PASSWORD: hive
    ports:
      - "5433:5432"
    volumes:
      - metastore_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hive -d metastore_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lakehouse

  hive-metastore:
    build:
      context: .
      dockerfile: docker/hive/Dockerfile
    container_name: hive-metastore
    environment:
      SERVICE_NAME: metastore
      DB_DRIVER: postgres
      SERVICE_OPTS: >-
        -Djavax.jdo.option.ConnectionDriverName=org.postgresql.Driver
        -Djavax.jdo.option.ConnectionURL=jdbc:postgresql://metastore-postgres:5432/metastore_db
        -Djavax.jdo.option.ConnectionUserName=hive
        -Djavax.jdo.option.ConnectionPassword=hive
    depends_on:
      metastore-postgres:
        condition: service_healthy
    ports:
      - "9083:9083"
    volumes:
      - ./configs/hadoop/core-site.xml:/opt/hadoop/etc/hadoop/core-site.xml:ro
      - warehouse_data:/opt/hive/data/warehouse
    networks:
      - lakehouse

  trino:
    image: trinodb/trino:476
    container_name: trino
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:-minioadmin}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:-minioadmin}"
    depends_on:
      hive-metastore:
        condition: service_started
      minio:
        condition: service_healthy
    ports:
      - "8081:8080"
    volumes:
      - ./docker/trino/config.properties:/etc/trino/config.properties:ro
      - ./docker/trino/jvm.config:/etc/trino/jvm.config:ro
      - ./docker/trino/node.properties:/etc/trino/node.properties:ro
      - ./docker/trino/catalog:/etc/trino/catalog:ro
      - ./data:/lake:ro
      - warehouse_data:/opt/hive/data/warehouse
    networks:
      - lakehouse

  spark-master:
    image: spark:3.5.8-python3
    container_name: spark-master
    command: ["/bin/bash", "/opt/spark/scripts/start-master.sh"]
    environment:
      SPARK_NO_DAEMONIZE: "true"
    ports:
      - "7077:7077"
      - "8082:8080"
    volumes:
      - ./configs/spark/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro
      - ./docker/spark:/opt/spark/scripts:ro
      - ./data:/opt/spark/work-dir/data
      - ./pipelines:/opt/spark/work-dir/pipelines
      - ./reports:/opt/spark/work-dir/reports
      - ./jars:/opt/spark/work-dir/jars
    networks:
      - lakehouse

  spark-worker:
    image: spark:3.5.8-python3
    container_name: spark-worker
    command: ["/bin/bash", "/opt/spark/scripts/start-worker.sh"]
    environment:
      SPARK_NO_DAEMONIZE: "true"
      SPARK_WORKER_MEMORY: 2G
      SPARK_WORKER_CORES: 2
    depends_on:
      - spark-master
    ports:
      - "8083:8081"
    volumes:
      - ./configs/spark/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro
      - ./docker/spark:/opt/spark/scripts:ro
      - ./data:/opt/spark/work-dir/data
      - ./pipelines:/opt/spark/work-dir/pipelines
      - ./reports:/opt/spark/work-dir/reports
      - ./jars:/opt/spark/work-dir/jars
    networks:
      - lakehouse

  airflow-postgres:
    image: postgres:16
    container_name: airflow-postgres
    environment:
      POSTGRES_DB: airflow
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
    ports:
      - "5434:5432"
    volumes:
      - airflow_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lakehouse

  metabase-postgres:
    image: postgres:16
    container_name: metabase-postgres
    environment:
      POSTGRES_DB: metabaseappdb
      POSTGRES_USER: metabase
      POSTGRES_PASSWORD: metabase
    volumes:
      - metabase_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U metabase -d metabaseappdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lakehouse

  metabase:
    image: metabase/metabase:latest
    container_name: metabase
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabaseappdb
      MB_DB_PORT: 5432
      MB_DB_USER: metabase
      MB_DB_PASS: metabase
      MB_DB_HOST: metabase-postgres
      JAVA_TIMEZONE: Asia/Ho_Chi_Minh
      MB_SITE_URL: http://localhost:3000
    depends_on:
      metabase-postgres:
        condition: service_healthy
      trino:
        condition: service_started
    ports:
      - "3000:3000"
    networks:
      - lakehouse

  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    command: api-server
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    ports:
      - "8080:8080"

  airflow-dag-processor:
    <<: *airflow-common
    container_name: airflow-dag-processor
    command: dag-processor
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully

networks:
  lakehouse:
    driver: bridge

volumes:
  minio_data:
  metastore_postgres_data:
  airflow_postgres_data:
  metabase_postgres_data:
  warehouse_data:
